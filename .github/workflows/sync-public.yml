name: Sync to Public Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove core game logic and sensitive files
        run: |
          rm -f game/room.py
          rm -f game/manager.py
          rm -f sockets/director.py
          rm -f sockets/lobby.py
          rm -f sockets/gameplay.py
          rm -f .env
          rm -f .env.*
          echo "✅ Sensitive files removed."

      - name: Push to public repo
        run: |
          git config user.name "PankajChauhanji"
          git config user.email "pankajchauhan.nitsri@gmail.com"
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/PankajChauhanji/DrawHunt.git
          git add -A
          git commit -m "sync: update public snapshot" || echo "Nothing to commit"
          git push public main --force