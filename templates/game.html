<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Draw Hunt — a fast-paced multiplayer draw and guess game. Create a room, invite friends, and start drawing!" />
  <title>draw_hunt — room {{ room_code }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Fredoka:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="room" data-conn="connecting">
  <header class="topbar">
    <span class="brand-sm"><span class="blot sm"></span> draw_hunt</span>
    <span class="conn" title="connection"><span id="conn-dot" class="conn-dot"></span></span>
  </header>

  <main class="lobby" id="lobby-view">
    <section class="code-stamp">
      <p class="code-label">room code</p>
      <p id="room-code" class="code-value">····</p>
      <button id="copy-btn" class="btn btn-ghost small">Copy code</button>
    </section>

    <section class="panel players-panel">
      <div class="panel-head">
        <h2>Players</h2>
        <span id="player-count" class="count">0/{{ max_players }}</span>
      </div>
      <div id="players" class="players"></div>
    </section>

    <section class="panel settings-panel">
      <div class="panel-head"><h2>Game Settings</h2></div>
      <div class="setting">
        <label for="rounds-select">Rounds</label>
        <select id="rounds-select" class="field">
          {% for r in allowed_rounds %}<option value="{{ r }}">{{ r }}</option>{% endfor %}
        </select>
      </div>
      <div class="setting">
        <label for="duration-select">Draw Time</label>
        <select id="duration-select" class="field">
          {% for d in allowed_durations %}<option value="{{ d }}">{{ d }}s</option>{% endfor %}
        </select>
      </div>
      <div class="setting">
        <label for="wordmode-select">Word Source</label>
        <select id="wordmode-select" class="field">
          <option value="auto">Automatic — pick from 3</option>
          <option value="own">Drawer types their own</option>
        </select>
      </div>

      <div class="setting toggles">
        <label class="toggle">
          <input type="checkbox" id="show-theme-toggle" />
          <span>Show Theme hint</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="show-language-toggle" />
          <span>Show Language hint</span>
        </label>
      </div>

      <p id="settings-note" class="settings-note"></p>

      <button id="start-btn" class="btn btn-primary" style="display:none">Start Game</button>
      <p id="wait-note" class="wait-note" style="display:none">Waiting for the host to start…</p>
    </section>
  </main>

  <section class="board-wrap" id="board-view" style="display:none">
    <div class="board-head">
      <div class="head-left">
        <span id="round-badge" class="round-badge"></span>
        <div class="word-area">
          <span id="word-context" class="word-context"></span>
          <span id="word-bar" class="word-bar">·····</span>
        </div>
      </div>
      <div class="head-actions">
        <span id="timer" class="timer"></span>
        <button id="back-to-lobby" class="btn btn-ghost small" style="display:none">Back to lobby</button>
      </div>
    </div>

    <div class="board-main">
      <div class="board-left">
        <div class="canvas-frame">
          <canvas id="board-canvas"></canvas>
        </div>
        <div class="toolbar">
          <div class="tool-group">
            <span class="tool-group-label">Colors</span>
            <div id="swatches" class="swatches"></div>
          </div>

          <div class="tool-group brush-group">
            <span class="tool-group-label">Brush</span>
            <div class="brush-controls">
              <span id="brush-preview" class="brush-preview" title="Brush preview">
                <span id="brush-preview-dot" class="brush-preview-dot"></span>
              </span>
              <input id="size-slider" class="size-slider" type="range" min="1" max="40" value="6"
                     aria-label="Brush size" />
            </div>
          </div>

          <div class="tool-group">
            <span class="tool-group-label">Tools</span>
            <div class="tool-buttons">
              <button id="brush-btn" class="tool-btn active" title="Brush">🖌️ Brush</button>
              <button id="bucket-btn" class="tool-btn" title="Fill bucket">🪣 Fill</button>
              <button id="eraser-btn" class="tool-btn" title="Eraser">🧽 Eraser</button>
            </div>
          </div>

          <div class="tool-group actions-group">
            <button id="undo-btn" class="tool-btn" title="Undo">↶ Undo</button>
            <button id="clear-btn" class="tool-btn danger" title="Clear">Clear</button>
          </div>
        </div>
      </div>

      <aside class="board-side">
        <div id="side-players" class="side-players"></div>
        <div class="chat">
          <div id="chat-log" class="chat-log"></div>
          <div class="chat-input-row">
            <input id="chat-input" class="field" maxlength="200" placeholder="Type your guess…" autocomplete="off" />
            <div class="reaction-wrap">
              <button id="reaction-btn" class="reaction-btn" type="button" title="React" aria-label="Send a reaction">😊</button>
              <div id="reaction-picker" class="reaction-picker" role="menu" aria-hidden="true"></div>
            </div>
            <button id="chat-send" class="btn btn-primary small">Send</button>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <div id="reactions-layer" class="reactions-layer" aria-hidden="true"></div>

  <div id="overlay" class="overlay">
    <div id="overlay-body" class="overlay-card"></div>
  </div>

  <div class="footer-cta-wrap">
    <p class="footer-cta">If you enjoyed draw_hunt, please <a href="https://github.com/PankajChauhanji/DrawHunt" target="_blank" rel="noreferrer">leave a star on GitHub</a> ⭐ — it keeps the project alive.</p>
  </div>

  <script>
    window.INKLING = {
      code: "{{ room_code }}",
      minPlayers: {{ min_players }},
      maxPlayers: {{ max_players }}
    };
  </script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="{{ url_for('static', filename='js/identity.js') }}"></script>
  <script src="{{ url_for('static', filename='js/canvas.js') }}"></script>
  <script src="{{ url_for('static', filename='js/board.js') }}"></script>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
  <script src="{{ url_for('static', filename='js/lobby.js') }}"></script>
</body>
</html>
