<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>draw_hunt — draw & guess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Fredoka:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="landing">
  <main class="card">
    <div class="brand">
      <span class="blot"></span>
      <h1>draw_hunt</h1>
    </div>
    <p class="tagline">someone draws, everyone guesses</p>

    <label class="field-label" for="name-input">Your name</label>
    <input id="name-input" class="field" maxlength="20" placeholder="e.g. Sam" autocomplete="off" />

    <button id="create-btn" class="btn btn-primary">Create a room</button>

    <div class="divider"><span>or join one</span></div>

    <div class="join-row">
      <input id="code-input" class="field code-field" maxlength="4" placeholder="CODE" autocomplete="off" />
      <button id="join-btn" class="btn btn-ghost">Join</button>
    </div>

    <p id="landing-error" class="error" role="alert"></p>
    <p class="footnote">share the room code with friends — up to 10 can play</p>
  </main>
  <!-- Footer section contains urls to connect like linkedin or github and gmail -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; draw_hunt</span>
      <span class="footer-links">
        <a href="https://github.com/PankajChauhanji/draw_hunt" target="_blank" rel="noreferrer">GitHub</a>
        <a href="mailto:pankajchauhan.nitsri@gmail.com">Email</a>
        <a href="https://www.linkedin.com/in/pankaj-chauhan-sde/" target="_blank" rel="noreferrer">LinkedIn</a>
      </span>
    </div>
  </footer>

  <div class="footer-cta-wrap">
    <p class="footer-cta">If you enjoyed draw_hunt, please <a href="https://github.com/PankajChauhanji/draw_hunt" target="_blank" rel="noreferrer">leave a star on GitHub</a> ⭐ — it keeps the project alive.</p>
  </div>

  <script src="{{ url_for('static', filename='js/identity.js') }}"></script>
  <script src="{{ url_for('static', filename='js/landing.js') }}"></script>
</body>
</html>
